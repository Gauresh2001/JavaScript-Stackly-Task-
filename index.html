<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Real-Time API Project</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Product Store</h1>

  <div class="top-bar">

    <input
      type="text"
      id="searchInput"
      placeholder="Search products..."
    >

    <div class="cart-box">
      🛒 Cart Count:
      <span id="cartCount">0</span>
    </div>

  </div>

  <div class="category-buttons">

    <button onclick="filterCategory('all')">
      All
    </button>

    <button onclick="filterCategory('electronics')">
      Electronics
    </button>

    <button onclick="filterCategory('jewelery')">
      Jewelery
    </button>

    <button onclick="filterCategory(`men's clothing`)">
  Men's Clothing
</button>

<button onclick="filterCategory(`women's clothing`)">
  Women's Clothing
</button>

  </div>

  <h2 class="total-price">
    Total Price:
    $<span id="totalPrice">0</span>
  </h2>

  <div id="message"></div>

  <div id="products" class="product-container"></div>

  <script src="script.js"></script>

</body>
</html>
